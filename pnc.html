<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Data Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Visitor Data</h1>
  <table id="dataTable">
    <thead>
      <tr>
        <th>IP</th>
        <th>Region</th>
        <th>Date & Time</th>
        <th>LongLat</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be inserted here -->
    </tbody>
  </table>

  <script>
    async function loadData() {
      try {
        // Use API endpoint instead of static CSV file
        const response = await fetch('/api/visitors');
        const csvText = await response.text();
        const lines = csvText.trim().split('\n');
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = ''; // Clear existing rows

        if (lines.length <= 1) {
          tbody.innerHTML = '<tr><td colspan="4">No visitors recorded yet</td></tr>';
          return;
        }

        for (let i = 1; i < lines.length; i++) { // Skip header
          const [ip, region, dateTime, longLat] = lines[i].split(',');
          if (!ip) continue;
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${ip || '-'}</td>
            <td>${region || '-'}</td>
            <td>${dateTime || '-'}</td>
            <td>${longLat || '-'}</td>
          `;
          tbody.appendChild(row);
        }
        
        // Update count
        document.querySelector('h1').textContent = `Visitor Data (${lines.length - 1} records)`;
      } catch (error) {
        console.error('Error loading data:', error);
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '<tr><td colspan="4">Error loading data. Make sure the server is running.</td></tr>';
      }
    }

    // Load data on page load
    window.addEventListener('load', loadData);
    
    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
