<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Visitor Data Table</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    h1 {
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Visitor Data</h1>
  <table id="dataTable">
    <thead>
      <tr>
        <th>IP</th>
        <th>Region</th>
        <th>Date & Time</th>
        <th>LongLat</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be inserted here -->
    </tbody>
  </table>

  <script>
    async function loadData() {
      try {
        const response = await fetch('/api/visitors/json');
        if (!response.ok) {
          let message = `Visitor API returned ${response.status}`;
          try {
            const errorData = await response.json();
            message = errorData.message || errorData.error || message;
          } catch (parseError) {
            // Keep the status message if the response is not JSON.
          }
          throw new Error(message);
        }
        const data = await response.json();
        const visitors = data.visitors || [];
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = ''; // Clear existing rows

        if (!visitors.length) {
          tbody.innerHTML = '<tr><td colspan="4">No visitors recorded yet</td></tr>';
          document.querySelector('h1').textContent = 'Visitor Data (0 records)';
          return;
        }

        visitors.forEach(visitor => {
          const row = document.createElement('tr');
          [visitor.ip, visitor.region, visitor.dateTime, visitor.longLat].forEach(value => {
            const cell = document.createElement('td');
            cell.textContent = value || '-';
            row.appendChild(cell);
          });
          tbody.appendChild(row);
        });
        
        // Update count
        document.querySelector('h1').textContent = `Visitor Data (${visitors.length} records)`;
      } catch (error) {
        console.error('Error loading data:', error);
        const tbody = document.querySelector('#dataTable tbody');
        tbody.innerHTML = '';
        const row = document.createElement('tr');
        const cell = document.createElement('td');
        cell.colSpan = 4;
        cell.textContent = `Error loading data: ${error.message}`;
        row.appendChild(cell);
        tbody.appendChild(row);
      }
    }

    // Load data on page load
    window.addEventListener('load', loadData);
    
    // Auto-refresh every 30 seconds
    setInterval(loadData, 30000);
  </script>
</body>
</html>
