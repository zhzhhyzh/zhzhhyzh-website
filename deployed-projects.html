<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployed Projects | Zhe Heng Y.</title>
  <meta name="description" content="Live deployed projects and tools by Yeoh Zhe Heng." />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='black'/><text x='50' y='62' font-size='56' text-anchor='middle' fill='white' font-family='sans-serif'>ZH.</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-start: #0a0a0c;
      --bg-end: #0d0d10;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --text: #f5f5f7;
      --text-secondary: #a1a1a6;
      --muted: #86868b;
      --radius-md: 12px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --transition-fast: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
      --transition-smooth: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: "Poppins", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-start), var(--bg-end));
      min-height: 100vh;
    }

    /* Back Navigation */
    .back-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 1rem 2rem;
      background: rgba(10, 10, 12, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition-fast);
    }

    .back-link:hover {
      color: var(--accent-hover);
      transform: translateX(-3px);
    }

    .back-link svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .nav-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Page Content */
    .page-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 6rem 2rem 3rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
    }

    /* Section */
    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, var(--accent), #5e5ce6);
      border-radius: 2px;
    }

    .section {
      margin-bottom: 3rem;
    }

    /* Project Grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Project Card */
    .project-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all var(--transition-smooth);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      will-change: transform;
      transform: translateZ(0);
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(0, 113, 227, 0.3);
      box-shadow: 0 20px 50px rgba(0, 113, 227, 0.15);
    }

    /* Preview Frame */
    .preview-container {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
      background: #111;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .preview-container iframe {
      width: 200%;
      height: 400%;
      transform: scale(0.5);
      transform-origin: top left;
      border: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .preview-container iframe.frame-loaded {
      opacity: 1;
    }

    .preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(10, 10, 12, 0.8) 100%);
      z-index: 2;
    }

    .preview-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 12, 0.9);
      color: var(--muted);
      font-size: 0.8rem;
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .preview-loading.loaded {
      opacity: 0;
      pointer-events: none;
    }

    /* Card Info */
    .card-info {
      padding: 1.25rem 1.5rem;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
    }

    .card-url {
      font-size: 0.75rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-action {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    .card-action svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
      transition: transform var(--transition-fast);
    }

    .project-card:hover .card-action svg {
      transform: translateX(4px);
    }

    /* Footer */
    .page-footer {
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .page-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Responsive */
    @media (max-width: 767px) {
      .page-container {
        padding: 5rem 1rem 2rem;
      }

      .page-header h1 {
        font-size: 1.8rem;
      }

      .page-header p {
        font-size: 0.9rem;
      }

      .project-grid {
        grid-template-columns: 1fr;
        gap: 1.25rem;
      }

      .preview-container {
        height: 170px;
      }

      .back-nav {
        padding: 0.8rem 1rem;
      }
    }

    @media (max-width: 480px) {
      .page-header h1 {
        font-size: 1.5rem;
      }

      .section-title {
        font-size: 1.1rem;
      }

      .preview-container {
        height: 150px;
      }

      .card-info {
        padding: 1rem 1.25rem;
      }
    }

    /* Reveal animation */
    .reveal-card {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .reveal-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- Back Navigation -->
  <nav class="back-nav">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
      </svg>
      Back to Portfolio
    </a>
    <span class="nav-title">Deployed Projects</span>
  </nav>

  <div class="page-container">

    <!-- Header -->
    <div class="page-header">
      <h1>Deployed Projects</h1>
      <p>Live projects and tools you can try right now</p>
    </div>

      <!-- Tools Section -->
    <div class="section">
      <h2 class="section-title">Developer Tools</h2>
      <div class="project-grid" id="toolsGrid">
        <!-- Populated by JS -->
      </div>
    </div>
    
    <!-- Games Section -->
    <div class="section">
      <h2 class="section-title">Games</h2>
      <div class="project-grid" id="gamesGrid">
        <!-- Populated by JS -->
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="page-footer">
    <p>&copy; <span id="year"></span> Yeoh Zhe Heng &middot; <a href="index.html">Back to Portfolio</a></p>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const projects = {
      tools: [
        { name: "Dev Tools", url: "https://zhzhhyzh-dev-tools.vercel.app/", desc: "Collection of handy developer utilities" },
        { name: "PDF Tools", url: "https://zhzhhyzh-pdf-tools.vercel.app/", desc: "Merge, split, and manage PDF files online" }
      ],
      games: [
        { name: "Snake Game", url: "https://zhzhhyzh.github.io/snake-game/", desc: "Endless snake with skins, themes, procedural BGM & sprint mode" },
        { name: "Slot Verse", url: "https://zhzhhyzh.github.io/slot-verse/", desc: "Exciting igaming with various themes, NOT FOR PRODUCTION" },
        { name: "Count Stickman Game", url: "https://zhzhhyzh.github.io/count-stickman-game/", desc: "Fun counting stickman challenge game" },
        { name: "Upgrade Car Game", url: "https://zhzhhyzh.github.io/upgrade-car-game/", desc: "Upgrade and race your car to victory" },
        { name: "Dress Up Game", url: "https://zhzhhyzh.github.io/dress-up-game/", desc: "Style and dress up characters with cool outfits" },
        { name: "Tetris", url: "https://zhzhhyzh.github.io/tetris-game/", desc: "Classic Tetris with smooth controls" }
      ]
    };

    function createCard(project, delay) {
      const card = document.createElement('a');
      card.href = project.url;
      card.target = '_blank';
      card.className = 'project-card reveal-card';
      card.style.transitionDelay = delay + 'ms';
      card.dataset.previewUrl = project.url;

      const shortUrl = project.url.replace(/^https?:\/\//, '').replace(/\/$/, '');

      card.innerHTML = `
        <div class="preview-container">
          <div class="preview-loading">Loading preview...</div>
          <div class="preview-overlay"></div>
        </div>
        <div class="card-info">
          <div class="card-name">${project.name}</div>
          <div class="card-url">${shortUrl}</div>
          ${project.desc ? `<div style="font-size:0.8rem;color:#a1a1a6;margin-top:0.25rem;">${project.desc}</div>` : ''}
          <div class="card-action">
            Visit
            <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </div>
        </div>
      `;

      return card;
    }

    // Populate grids
    const gamesGrid = document.getElementById('gamesGrid');
    const toolsGrid = document.getElementById('toolsGrid');

    
    projects.tools.forEach((p, i) => {
      toolsGrid.appendChild(createCard(p, i * 100));
    });

    projects.games.forEach((p, i) => {
      gamesGrid.appendChild(createCard(p, i * 100));
    });

    // Combined observer: reveal card + lazy-load iframe
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          // Reveal animation
          card.classList.add('visible');
          // Lazy-load iframe
          const url = card.dataset.previewUrl;
          const container = card.querySelector('.preview-container');
          const loader = card.querySelector('.preview-loading');
          if (url && container && !container.querySelector('iframe')) {
            const iframe = document.createElement('iframe');
            iframe.loading = 'lazy';
            iframe.sandbox = 'allow-scripts allow-same-origin';
            iframe.title = card.querySelector('.card-name').textContent + ' preview';
            iframe.onload = () => {
              iframe.classList.add('frame-loaded');
              if (loader) loader.classList.add('loaded');
            };
            iframe.src = url;
            container.appendChild(iframe);
          }
          observer.unobserve(card);
        }
      });
    }, { threshold: 0.05, rootMargin: '100px' });

    document.querySelectorAll('.reveal-card').forEach(card => observer.observe(card));
  </script>
</body>

</html>
